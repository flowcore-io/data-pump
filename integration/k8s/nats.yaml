apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: data-pump-integration-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          ports:
            - containerPort: 4222
          readinessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: data-pump-integration-test
spec:
  selector:
    app: nats
  ports:
    - port: 4222
      targetPort: 4222
