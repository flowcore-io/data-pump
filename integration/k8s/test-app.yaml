apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-pump-test
  namespace: data-pump-integration-test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-pump-test
  template:
    metadata:
      labels:
        app: data-pump-test
    spec:
      containers:
        - name: data-pump
          image: data-pump-integration-test:local
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: data-pump-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-pump-test
  namespace: data-pump-integration-test
spec:
  clusterIP: None
  selector:
    app: data-pump-test
  ports:
    - port: 8080
      targetPort: 8080
