name: Test

on:
  push:
    branches-ignore: ["main"]

env:
  BUN_VERSION: "1.3.14"

permissions:
  contents: read

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2204

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.FLOWCORE_MACHINE_GITHUB_TOKEN }}
          submodules: true
      - name: Extract version from package.json
        uses: sergeysova/jq-action@v2
        id: version
        with:
          cmd: "jq .version package.json -r"

      - name: Show my version
        run: 'echo "version ${{ steps.version.outputs.value }}"'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format:check
      - name: Type check
        run: bun run typecheck
      - name: Test
        run: bun test
      - name: Build
        run: bun run build

  integration-test:
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: build
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.FLOWCORE_MACHINE_GITHUB_TOKEN }}
          submodules: true
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Docker
        run: |
          if ! command -v docker &>/dev/null; then
            curl -fsSL https://get.docker.com | sh
          fi
          docker version
      - name: Run integration tests
        run: bash integration/run-integration.sh
      - name: Collect logs on failure
        if: failure()
        run: |
          export PATH="$PWD/.cache/bin:$PATH"
          kubectl logs -n data-pump-integration-test -l app=data-pump-test --tail=200 || true
          kubectl logs -n data-pump-integration-test -l app=postgres --tail=100 || true
      - name: Teardown
        if: always()
        run: PATH="$PWD/.cache/bin:$PATH" bash integration/scripts/teardown.sh || true
